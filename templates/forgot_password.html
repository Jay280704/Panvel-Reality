<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reset Password — Panvel Realty</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@600;700&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
  :root {
    --bg-dark: #090412;
    --card-bg: rgba(22, 12, 44, 0.45);
    --primary-purple: #4a2985;
    --light-purple: #81729c;
    --gold: #d4af37;
    --gold-hover: #b59223;
    --text-white: #ffffff;
    --text-muted: #a297c0;
    --error-red: #ef4444;
  }

  * {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
  }

  body {
    font-family: 'DM Sans', sans-serif;
    background-color: var(--bg-dark);
    background-image: 
      radial-gradient(circle at 15% 15%, rgba(111, 79, 201, 0.25) 0%, transparent 45%),
      radial-gradient(circle at 85% 85%, rgba(212, 175, 55, 0.12) 0%, transparent 45%),
      linear-gradient(135deg, #090412 0%, #150a28 100%);
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    color: var(--text-white);
    padding: 20px;
    position: relative;
    overflow-x: hidden;
  }

  .login-wrapper {
    width: 100%;
    max-width: 440px;
    position: relative;
    z-index: 10;
  }

  .login-card {
    background: var(--card-bg);
    backdrop-filter: blur(24px);
    -webkit-backdrop-filter: blur(24px);
    border: 1px solid rgba(255, 255, 255, 0.06);
    border-radius: 24px;
    padding: 44px 40px;
    box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.6);
    animation: fadeInUp 0.6s cubic-bezier(0.16, 1, 0.3, 1);
    border-top: 1px solid rgba(212, 175, 55, 0.2);
  }

  .brand {
    text-align: center;
    margin-bottom: 30px;
  }

  .brand-logo {
    font-family: 'Cormorant Garamond', serif;
    font-size: 34px;
    font-weight: 700;
    letter-spacing: 0.5px;
    color: var(--text-white);
    text-decoration: none;
  }

  .brand-logo span {
    color: var(--gold);
  }

  .brand-subtitle {
    font-size: 11px;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 3px;
    margin-top: 8px;
    font-weight: 600;
  }

  .form-group {
    margin-bottom: 24px;
    position: relative;
  }

  .form-label {
    display: block;
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--gold);
    margin-bottom: 8px;
  }

  .input-wrapper {
    position: relative;
    display: flex;
    align-items: center;
  }

  .input-icon {
    position: absolute;
    left: 16px;
    color: var(--text-muted);
    font-size: 14px;
    pointer-events: none;
    transition: color 0.3s ease;
  }

  .input-control {
    width: 100%;
    padding: 14px 16px 14px 44px;
    background: rgba(255, 255, 255, 0.04);
    border: 1px solid rgba(255, 255, 255, 0.08);
    border-radius: 12px;
    font-size: 14px;
    color: var(--text-white);
    outline: none;
    transition: all 0.3s ease;
  }

  .input-control::placeholder {
    color: rgba(255, 255, 255, 0.25);
  }

  .input-control:focus {
    border-color: var(--gold);
    background: rgba(255, 255, 255, 0.07);
    box-shadow: 0 0 14px rgba(212, 175, 55, 0.15);
  }

  .input-control:focus + .input-icon {
    color: var(--gold);
  }

  .password-wrapper .input-control {
    padding-right: 48px;
  }

  .toggle-password {
    position: absolute;
    right: 16px;
    top: 50%;
    transform: translateY(-50%);
    background: none;
    border: none;
    color: var(--text-muted);
    cursor: pointer;
    font-size: 15px;
    transition: color 0.2s ease;
    user-select: none;
    display: flex;
    align-items: center;
  }

  .toggle-password:hover {
    color: var(--text-white);
  }

  .btn-login {
    width: 100%;
    padding: 15px;
    background: linear-gradient(135deg, var(--gold) 0%, var(--gold-hover) 100%);
    color: var(--text-white);
    border: none;
    border-radius: 12px;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.3s ease;
    margin-top: 8px;
    letter-spacing: 0.5px;
    box-shadow: 0 4px 15px rgba(212, 175, 55, 0.2);
  }

  .btn-login:hover {
    transform: translateY(-1px);
    box-shadow: 0 8px 25px rgba(212, 175, 55, 0.35);
  }

  .btn-login:active {
    transform: scale(0.98);
  }

  .error-alert {
    background: rgba(239, 68, 68, 0.1);
    border: 1px solid rgba(239, 68, 68, 0.25);
    color: #fca5a5;
    padding: 12px 16px;
    border-radius: 12px;
    font-size: 13px;
    margin-bottom: 24px;
    display: flex;
    align-items: center;
    gap: 10px;
    animation: shake 0.4s ease;
  }

  .error-alert i {
    font-size: 14px;
    flex-shrink: 0;
  }

  .back-link {
    display: block;
    text-align: center;
    margin-top: 28px;
    font-size: 13px;
    color: var(--text-muted);
    text-decoration: none;
    transition: color 0.2s ease;
  }

  .back-link:hover {
    color: var(--text-white);
  }

  .question-box {
    background: rgba(255, 255, 255, 0.03);
    border: 1px solid rgba(255, 255, 255, 0.08);
    border-radius: 12px;
    padding: 16px 20px;
    margin-bottom: 24px;
    font-size: 14px;
    color: #f1ecfa;
    line-height: 1.6;
    border-left: 4px solid var(--gold);
  }

  @keyframes fadeInUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  @keyframes shake {
    0%, 100% { transform: translateX(0); }
    25% { transform: translateX(-6px); }
    75% { transform: translateX(6px); }
  }
</style>
</head>
<body>

  <div class="login-wrapper">
    <div class="login-card">
      <div class="brand">
        <a href="/" class="brand-logo">Panvel <span>Realty</span></a>
        <div class="brand-subtitle">Reset Password</div>
      </div>

      {% if error %}
      <div class="error-alert">
        <i class="fa-solid fa-triangle-exclamation"></i>
        <span>{{ error }}</span>
      </div>
      {% endif %}

      {% if step == 1 %}
      <!-- STEP 1: Search Username -->
      <form action="/admin/forgot-password" method="POST">
        <input type="hidden" name="action" value="search_username">
        
        <div class="form-group">
          <label class="form-label" for="username">Username</label>
          <div class="input-wrapper">
            <input type="text" id="username" name="username" class="input-control" required autocomplete="username" placeholder="Enter admin username" autofocus>
            <i class="fa-solid fa-user input-icon"></i>
          </div>
        </div>

        <button type="submit" class="btn-login">Verify Username <i class="fa-solid fa-circle-right" style="margin-left: 6px;"></i></button>
      </form>
      {% elif step == 2 %}
      <!-- STEP 2: Answer Question & Enter New Password -->
      <form action="/admin/forgot-password" method="POST">
        <input type="hidden" name="action" value="reset_password">
        <input type="hidden" name="username" value="{{ username }}">

        <label class="form-label">Security Question</label>
        <div class="question-box">
          <i class="fa-solid fa-shield-halved" style="color: var(--gold); margin-right: 8px;"></i> {{ security_question }}
        </div>

        <div class="form-group">
          <label class="form-label" for="security_answer">Answer</label>
          <div class="input-wrapper">
            <input type="text" id="security_answer" name="security_answer" class="input-control" required placeholder="Enter safety answer" autofocus autocomplete="off">
            <i class="fa-solid fa-key input-icon"></i>
          </div>
        </div>

        <div class="form-group">
          <label class="form-label" for="new_password">New Password</label>
          <div class="password-wrapper input-wrapper">
            <input type="password" id="new_password" name="new_password" class="input-control" required placeholder="Enter your new password">
            <i class="fa-solid fa-lock input-icon"></i>
            <button type="button" class="toggle-password" onclick="togglePasswordVisibility()" aria-label="Toggle password visibility">
              <i class="fa-solid fa-eye" id="eye-icon"></i>
            </button>
          </div>
        </div>

        <button type="submit" class="btn-login">Reset Password <i class="fa-solid fa-circle-check" style="margin-left: 6px;"></i></button>
      </form>
      {% endif %}

      <a href="/admin/login" class="back-link">Back to Sign In</a>
    </div>
  </div>

  <script>
    function togglePasswordVisibility() {
      const passwordField = document.getElementById('new_password');
      const eyeIcon = document.getElementById('eye-icon');
      if (passwordField.type === 'password') {
        passwordField.type = 'text';
        eyeIcon.classList.remove('fa-eye');
        eyeIcon.classList.add('fa-eye-slash');
      } else {
        passwordField.type = 'password';
        eyeIcon.classList.remove('fa-eye-slash');
        eyeIcon.classList.add('fa-eye');
      }
    }
  </script>
</body>
</html>
