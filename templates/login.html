<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Login — Panvel Realty</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@600;700&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg-dark: #0f051d;
    --card-bg: rgba(38, 20, 74, 0.35);
    --primary-purple: #3b1f6e;
    --light-purple: #7b6fa0;
    --gold: #c9973a;
    --gold-hover: #a67c2a;
    --text-white: #ffffff;
    --text-muted: #b5adc8;
    --error-red: #ef4444;
  }

  * {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
  }

  body {
    font-family: 'DM Sans', sans-serif;
    background-color: var(--bg-dark);
    background-image: 
      radial-gradient(circle at 10% 20%, rgba(59, 31, 110, 0.45) 0%, transparent 40%),
      radial-gradient(circle at 90% 80%, rgba(201, 151, 58, 0.15) 0%, transparent 45%);
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    color: var(--text-white);
    overflow: hidden;
    padding: 20px;
  }

  /* Main Container */
  .login-wrapper {
    width: 100%;
    max-width: 440px;
    position: relative;
    z-index: 10;
  }

  /* Glassmorphic Card */
  .login-card {
    background: var(--card-bg);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border: 1px solid rgba(255, 255, 255, 0.08);
    border-radius: 24px;
    padding: 40px;
    box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
    animation: fadeInUp 0.6s cubic-bezier(0.16, 1, 0.3, 1);
  }

  /* Branding */
  .brand {
    text-align: center;
    margin-bottom: 35px;
  }

  .brand-logo {
    font-family: 'Cormorant Garamond', serif;
    font-size: 32px;
    font-weight: 700;
    letter-spacing: 0.5px;
    color: var(--text-white);
    text-decoration: none;
  }

  .brand-logo span {
    color: var(--gold);
    font-style: italic;
  }

  .brand-subtitle {
    font-size: 13px;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 2px;
    margin-top: 6px;
    font-weight: 500;
  }

  /* Form Elements */
  .form-group {
    margin-bottom: 24px;
    position: relative;
  }

  .form-label {
    display: block;
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--gold);
    margin-bottom: 8px;
  }

  .input-control {
    width: 100%;
    padding: 14px 16px;
    background: rgba(255, 255, 255, 0.04);
    border: 1px solid rgba(255, 255, 255, 0.1);
    border-radius: 12px;
    font-size: 15px;
    color: var(--text-white);
    outline: none;
    transition: all 0.3s ease;
  }

  .input-control:focus {
    border-color: var(--gold);
    background: rgba(255, 255, 255, 0.07);
    box-shadow: 0 0 0 3px rgba(201, 151, 58, 0.2);
  }

  /* Password Field Specifics */
  .password-wrapper {
    position: relative;
  }

  .password-wrapper .input-control {
    padding-right: 48px;
  }

  .toggle-password {
    position: absolute;
    right: 16px;
    top: 50%;
    transform: translateY(-50%);
    background: none;
    border: none;
    color: var(--text-muted);
    cursor: pointer;
    font-size: 14px;
    font-weight: 600;
    transition: color 0.2s ease;
    user-select: none;
  }

  .toggle-password:hover {
    color: var(--text-white);
  }

  /* Submit Button */
  .btn-login {
    width: 100%;
    padding: 14px;
    background: var(--gold);
    color: var(--text-white);
    border: none;
    border-radius: 12px;
    font-size: 16px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.3s ease;
    margin-top: 8px;
  }

  .btn-login:hover {
    background: var(--gold-hover);
    box-shadow: 0 8px 20px rgba(201, 151, 58, 0.25);
  }

  .btn-login:active {
    transform: scale(0.98);
  }

  /* Error Alert */
  .error-alert {
    background: rgba(239, 68, 68, 0.12);
    border: 1px solid rgba(239, 68, 68, 0.3);
    color: #fca5a5;
    padding: 12px 16px;
    border-radius: 12px;
    font-size: 13px;
    margin-bottom: 24px;
    display: flex;
    align-items: center;
    gap: 8px;
    animation: shake 0.4s ease;
  }

  .error-alert svg {
    flex-shrink: 0;
  }

  /* Back to home link */
  .back-link {
    display: block;
    text-align: center;
    margin-top: 25px;
    font-size: 13px;
    color: var(--text-muted);
    text-decoration: none;
    transition: color 0.2s ease;
  }

  .back-link:hover {
    color: var(--text-white);
  }

  /* Animations */
  @keyframes fadeInUp {
    from {
      opacity: 0;
      transform: translateY(20px);
    }
    to {
      opacity: 1;
      transform: translateY(0);
    }
  }

  @keyframes shake {
    0%, 100% { transform: translateX(0); }
    25% { transform: translateX(-6px); }
    75% { transform: translateX(6px); }
  }

  /* Responsive Adjustments */
  @media (max-width: 480px) {
    .login-card {
      padding: 30px 20px;
    }
  }
</style>
</head>
<body>

  <div class="login-wrapper">
    <div class="login-card">
      <div class="brand">
        <a href="/" class="brand-logo">Panvel <span>Realty</span></a>
        <div class="brand-subtitle">Admin Portal</div>
      </div>

      {% if error %}
      <div class="error-alert">
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" viewBox="0 0 16 16">
          <path d="M7.938 2.016A.13.13 0 0 1 8.002 2a.13.13 0 0 1 .063.016.146.146 0 0 1 .054.057l6.857 11.667c.036.06.035.124.002.183a.163.163 0 0 1-.054.06.116.116 0 0 1-.066.017H1.146a.115.115 0 0 1-.066-.017.163.163 0 0 1-.054-.06.176.176 0 0 1 .002-.183L7.884 2.073a.147.147 0 0 1 .054-.057zm1.044-.45a1.13 1.13 0 0 0-1.96 0L.165 13.233c-.457.778.091 1.767.98 1.767h13.713c.889 0 1.438-.99.98-1.767L8.982 1.566z"/>
          <path d="M7.002 12a1 1 0 1 1 2 0 1 1 0 0 1-2 0zM7.1 5.995a.905.905 0 1 1 1.8 0l-.35 3.507a.552.552 0 0 1-1.1 0L7.1 5.995z"/>
        </svg>
        <span>{{ error }}</span>
      </div>
      {% endif %}

      {% if success_message %}
      <div class="success-alert" style="background: rgba(16, 185, 129, 0.12); border: 1px solid rgba(16, 185, 129, 0.3); color: #a7f3d0; padding: 12px 16px; border-radius: 12px; font-size: 13px; margin-bottom: 24px; display: flex; align-items: center; gap: 8px;">
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" viewBox="0 0 16 16">
          <path d="M16 8A8 8 0 1 1 0 8a8 8 0 0 1 16 0zm-3.97-3.03a.75.75 0 0 0-1.08.022L7.477 9.417 5.384 7.323a.75.75 0 0 0-1.06 1.06L6.97 11.03a.75.75 0 0 0 1.079-.02l3.992-4.99a.75.75 0 0 0-.01-1.05z"/>
        </svg>
        <span>{{ success_message }}</span>
      </div>
      {% endif %}

      <form action="/admin/login" method="POST">
        <div class="form-group">
          <label class="form-label" for="username">Username</label>
          <input type="text" id="username" name="username" class="input-control" required autocomplete="username" placeholder="Enter admin username" autofocus>
        </div>

        <div class="form-group">
          <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px;">
            <label class="form-label" for="password" style="margin-bottom: 0;">Password</label>
            <a href="/admin/forgot-password" style="font-size: 11px; color: var(--gold); text-decoration: none; text-transform: uppercase; font-weight: 600; letter-spacing: 0.5px; transition: color 0.2s ease;" onmouseover="this.style.color='#a67c2a'" onmouseout="this.style.color='#c9973a'">Forgot Password?</a>
          </div>
          <div class="password-wrapper">
            <input type="password" id="password" name="password" class="input-control" required autocomplete="current-password" placeholder="Enter admin password">
            <button type="button" class="toggle-password" onclick="togglePasswordVisibility()">SHOW</button>
          </div>
        </div>

        <button type="submit" class="btn-login">Sign In</button>
      </form>

      <a href="/" class="back-link">← Back to Website</a>
    </div>
  </div>

  <script>
    function togglePasswordVisibility() {
      const passwordField = document.getElementById('password');
      const toggleBtn = document.querySelector('.toggle-password');
      if (passwordField.type === 'password') {
        passwordField.type = 'text';
        toggleBtn.textContent = 'HIDE';
      } else {
        passwordField.type = 'password';
        toggleBtn.textContent = 'SHOW';
      }
    }
  </script>
</body>
</html>
